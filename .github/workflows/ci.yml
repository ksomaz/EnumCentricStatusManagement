name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack UmbrellaFrame.EnumCentricStatusManagement.Core/UmbrellaFrame.EnumCentricStatusManagement.Core.csproj --configuration Release --no-build --output artifacts
